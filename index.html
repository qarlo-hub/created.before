document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n  src: url(\"2b90bc3d-284c-4a01-b83a-ad4b8a113a7f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --ink: #000000;\n    --paper: #ffffff;\n    --serif: \"Playfair Display\", \"Times New Roman\", Times, serif;\n    --sans: \"Work Sans\", system-ui, sans-serif;\n    --display: \"Inter\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  }\n\n  *, *::before, *::after { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: var(--paper);\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    text-rendering: optimizeLegibility;\n  }\n\n  body {\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 15px;\n    line-height: 1.6;\n    min-height: 100vh;\n    display: flex;\n    flex-direction: column;\n  }\n\n  ::selection { background: var(--ink); color: var(--paper); }\n\n  /* ——————————————————— layout shell */\n  .page {\n    width: 100%;\n    max-width: 880px;\n    margin: 0 auto;\n    padding: 56px 48px 80px;\n    flex: 1 0 auto;\n    display: flex;\n    flex-direction: column;\n  }\n\n  /* ——————————————————— masthead */\n  .masthead {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    border-bottom: 1px solid var(--ink);\n    padding-bottom: 18px;\n    font-family: var(--sans);\n    font-size: 11px;\n    font-weight: 400;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n  }\n\n  .masthead .issue { font-style: italic; font-family: var(--serif); font-weight: 400; letter-spacing: 0.04em; text-transform: none; font-size: 13px; }\n\n  /* ——————————————————— hero */\n  .hero {\n    margin-top: 22vh;\n    text-align: center;\n  }\n\n  .hero h1 {\n    font-family: var(--display);\n    font-weight: 900;\n    font-size: clamp(36px, 8.4vw, 132px);\n    line-height: 0.95;\n    letter-spacing: -0.045em;\n    margin: 0;\n    text-transform: lowercase;\n    white-space: nowrap;\n  }\n\n  .hero h1 .amp {\n    font-family: var(--display);\n    font-style: normal;\n    font-weight: 900;\n  }\n\n  .hero .subtitle {\n    margin-top: 28px;\n    font-family: var(--serif);\n    font-style: italic;\n    font-weight: 400;\n    font-size: clamp(18px, 2.2vw, 24px);\n    letter-spacing: 0.01em;\n    line-height: 1.4;\n  }\n\n  .hero .rule {\n    width: 1px;\n    height: 88px;\n    background: var(--ink);\n    margin: 64px auto 0;\n  }\n\n  /* ——————————————————— prompt section */\n  .prompt {\n    margin-top: 22vh;\n    text-align: center;\n  }\n\n  .prompt .eyebrow {\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 11px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    margin-bottom: 56px;\n  }\n\n  .prompt h2 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: clamp(40px, 6.4vw, 88px);\n    line-height: 1.05;\n    letter-spacing: -0.015em;\n    margin: 0 auto;\n    max-width: 16ch;\n    text-wrap: balance;\n  }\n\n  .prompt h2 em {\n    font-style: italic;\n    font-weight: 400;\n  }\n\n  /* ——————————————————— form */\n  .form {\n    margin: 88px auto 0;\n    max-width: 640px;\n    width: 100%;\n  }\n\n  .form-label {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    font-family: var(--sans);\n    font-size: 11px;\n    font-weight: 400;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    margin-bottom: 14px;\n  }\n\n  .form-label .count {\n    font-family: var(--serif);\n    font-style: italic;\n    font-weight: 400;\n    letter-spacing: 0;\n    text-transform: none;\n    font-size: 13px;\n  }\n\n  textarea {\n    display: block;\n    width: 100%;\n    min-height: 180px;\n    background: var(--paper);\n    color: var(--ink);\n    border: 1px solid var(--ink);\n    border-radius: 0;\n    padding: 22px 24px;\n    font-family: var(--serif);\n    font-size: 19px;\n    font-weight: 400;\n    line-height: 1.55;\n    text-align: center;\n    resize: none;\n    outline: none;\n    transition: box-shadow 120ms ease;\n  }\n\n  textarea::placeholder {\n    font-family: var(--serif);\n    font-style: italic;\n    color: var(--ink);\n    opacity: 0.35;\n  }\n\n  textarea:focus {\n    box-shadow: inset 0 0 0 1px var(--ink);\n  }\n\n  .form-foot {\n    margin-top: 32px;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    align-items: center;\n    gap: 28px;\n    text-align: center;\n  }\n\n  .form-foot .note {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: 13px;\n    line-height: 1.5;\n    max-width: 36ch;\n    margin: 0;\n    text-align: center;\n  }\n\n  .submit {\n    appearance: none;\n    -webkit-appearance: none;\n    background: var(--ink);\n    color: var(--paper);\n    border: 1px solid var(--ink);\n    border-radius: 0;\n    padding: 16px 36px;\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 11px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    cursor: pointer;\n    transition: background 120ms ease, color 120ms ease;\n  }\n\n  .submit:hover { background: var(--paper); color: var(--ink); }\n  .submit:active { background: var(--ink); color: var(--paper); }\n  .submit:disabled { cursor: not-allowed; opacity: 0.4; }\n\n  /* ——————————————————— acknowledgement (post-submit) */\n  .ack {\n    margin: 88px auto 0;\n    max-width: 560px;\n    text-align: center;\n    border-top: 1px solid var(--ink);\n    padding-top: 56px;\n  }\n\n  .ack p {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: clamp(20px, 2.4vw, 28px);\n    line-height: 1.45;\n    margin: 0;\n    text-wrap: pretty;\n  }\n\n  .ack .signoff {\n    font-family: var(--sans);\n    font-style: normal;\n    font-size: 11px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    margin-top: 32px;\n  }\n\n  .ack .echo {\n    font-family: var(--serif);\n    font-size: 17px;\n    font-style: normal;\n    font-weight: 400;\n    line-height: 1.55;\n    margin-top: 28px;\n    padding: 0 24px;\n    text-align: left;\n    border-left: 1px solid var(--ink);\n    padding-left: 20px;\n    text-wrap: pretty;\n  }\n\n  .ack.is-hidden { display: none; }\n  .form.is-hidden { display: none; }\n\n  /* ——————————————————— colophon footer */\n  .colophon {\n    margin-top: auto;\n    padding-top: 120px;\n  }\n\n  .colophon-inner {\n    border-top: 1px solid var(--ink);\n    padding-top: 22px;\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    font-family: var(--sans);\n    font-size: 11px;\n    font-weight: 400;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n  }\n\n  .colophon-inner .center {\n    font-family: var(--serif);\n    font-style: italic;\n    font-weight: 400;\n    letter-spacing: 0.02em;\n    text-transform: none;\n    font-size: 13px;\n  }\n\n  /* ——————————————————— small screens */\n  @media (max-width: 640px) {\n    .page { padding: 32px 24px 56px; }\n    .hero { margin-top: 14vh; }\n    .prompt { margin-top: 16vh; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <main class=\"page\">\n\n    <section class=\"hero\" aria-labelledby=\"title\">\n      <h1 id=\"title\">created before<span class=\"amp\">...<\u002Fspan><\u002Fh1>\n      <p class=\"subtitle\">proviamo a sopravvivere alla modernità<\u002Fp>\n    <\u002Fsection>\n\n    <section class=\"prompt\" aria-labelledby=\"question\">\n      <h2 id=\"question\">Cosa ti spaventa <em>del futuro?<\u002Fem><\u002Fh2>\n\n      <form class=\"form\" id=\"form\" novalidate=\"\">\n        <textarea id=\"answer\" name=\"answer\" rows=\"6\" aria-label=\"La tua risposta\" placeholder=\"Scrivi piano. Nessuno ha fretta.\" autocomplete=\"off\" spellcheck=\"false\"><\u002Ftextarea>\n        <div class=\"form-foot\">\n          <button class=\"submit\" type=\"submit\" id=\"submit\">Dimmi<\u002Fbutton>\n          <p class=\"note\">Le risposte non vengono pubblicate, né conservate. Solo lette, una volta, da nessuno in particolare.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fform>\n\n      <div class=\"ack is-hidden\" id=\"ack\" aria-live=\"polite\">\n        <p id=\"ack-text\">Grazie. La tua paura è stata accolta in silenzio.<\u002Fp>\n        <blockquote class=\"echo\" id=\"echo\"><\u002Fblockquote>\n        <p class=\"signoff\">— Created Before<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n<script>\n  (function () {\n    const ta = document.getElementById('answer');\n    const form = document.getElementById('form');\n    const ack = document.getElementById('ack');\n    const ackText = document.getElementById('ack-text');\n    const echo = document.getElementById('echo');\n\n    form.addEventListener('submit', function (e) {\n      e.preventDefault();\n      const v = ta.value.trim();\n      if (!v) {\n        ta.focus();\n        ta.style.boxShadow = 'inset 0 0 0 2px #000';\n        setTimeout(() => { ta.style.boxShadow = ''; }, 600);\n        return;\n      }\n      // show acknowledgement, hide form\n      form.classList.add('is-hidden');\n      ack.classList.remove('is-hidden');\n      // echo back the first sentence-ish, italicized in a pull-quote\n      const trimmed = v.length > 280 ? v.slice(0, 277).replace(/\\s+\\S*$/, '') + '…' : v;\n      echo.textContent = '« ' + trimmed + ' »';\n      // brief, considered acknowledgement\n      ackText.textContent = 'Grazie. La tua paura è stata accolta in silenzio.';\n    });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
