  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

yle>\n  :root {\n    --bg: oklch(18% 0.012 60);\n    --bg-2: oklch(22% 0.014 60);\n    --ink: oklch(94% 0.012 80);\n    --ink-dim: oklch(70% 0.012 80);\n    --rule: oklch(30% 0.012 60);\n    --accent: oklch(72% 0.13 55);\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); }\n  body {\n    font-family: \"JetBrains Mono\", ui-monospace, monospace;\n    overflow: hidden;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* Top chrome */\n  .chrome {\n    position: fixed; top: 0; left: 0; right: 0;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 14px 22px;\n    border-bottom: 1px solid var(--rule);\n    background: linear-gradient(to bottom, var(--bg) 70%, transparent);\n    z-index: 50;\n    font-size: 12px;\n    color: var(--ink-dim);\n    letter-spacing: 0.04em;\n    text-transform: uppercase;\n  }\n  .chrome .title { color: var(--ink); letter-spacing: 0.18em; }\n  .chrome .legend { display: flex; gap: 14px; flex-wrap: wrap; justify-content: flex-end; }\n  .chip {\n    display: inline-flex; align-items: center; gap: 6px;\n    padding: 3px 9px;\n    border: 1px solid var(--rule);\n    border-radius: 999px;\n    font-size: 11px;\n    background: var(--bg-2);\n  }\n  .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }\n  .chip[data-w=\"fire\"] { color: oklch(74% 0.19 45); }\n  .chip[data-w=\"smoke\"] { color: oklch(70% 0.01 250); }\n  .chip[data-w=\"metal\"] { color: oklch(82% 0.02 240); }\n  .chip[data-w=\"wind\"] { color: oklch(82% 0.06 200); }\n  .chip[data-w=\"ice\"] { color: oklch(85% 0.10 220); }\n  .chip[data-w=\"electric\"] { color: oklch(85% 0.18 95); }\n  .chip[data-w=\"water\"] { color: oklch(75% 0.13 230); }\n  .chip[data-w=\"gold\"] { color: oklch(85% 0.14 90); }\n  .chip[data-w=\"shadow\"] { color: oklch(45% 0.01 280); }\n  .chip[data-w=\"glitch\"] { color: oklch(75% 0.20 330); }\n\n  /* Stage */\n  .stage {\n    position: fixed;\n    inset: 60px 0 50px 0;\n    overflow: auto;\n    padding: 60px max(40px, 6vw) 120px;\n  }\n\n  /* Canvas overlay sits above the editor and lets clicks through */\n  #fx-canvas {\n    position: fixed;\n    inset: 60px 0 50px 0;\n    pointer-events: none;\n    z-index: 20;\n  }\n\n  /* Editor */\n  .editor {\n    position: relative;\n    width: 100%;\n    max-width: 1400px;\n    margin: 0 auto;\n    font-family: \"Fraunces\", \"Iowan Old Style\", Georgia, serif;\n    font-weight: 500;\n    font-size: clamp(36px, 5.2vw, 76px);\n    line-height: 1.18;\n    letter-spacing: -0.012em;\n    outline: none;\n    color: var(--ink);\n    caret-color: var(--accent);\n    z-index: 10;\n    word-break: break-word;\n  }\n  .editor:focus { outline: none; }\n  .editor::selection, .editor *::selection { background: oklch(72% 0.13 55 / 0.35); }\n\n  /* Word treatments — each effect targets <span class=\"fx fx-X\"> wrappers we inject */\n  .fx { position: relative; display: inline-block; transition: transform 200ms ease; }\n\n  /* FIRE: hot gradient + flicker glow */\n  .fx-fire {\n    background: linear-gradient(180deg,\n      oklch(95% 0.16 90) 0%,\n      oklch(82% 0.20 60) 35%,\n      oklch(65% 0.22 35) 70%,\n      oklch(50% 0.20 25) 100%);\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    text-shadow: 0 0 18px oklch(70% 0.20 45 / 0.6);\n    animation: fireFlicker 1.6s ease-in-out infinite;\n    filter: drop-shadow(0 0 6px oklch(70% 0.22 40 / 0.5));\n  }\n  @keyframes fireFlicker {\n    0%, 100% { filter: drop-shadow(0 0 6px oklch(70% 0.22 40 / 0.55)) brightness(1); }\n    50% { filter: drop-shadow(0 0 14px oklch(78% 0.22 50 / 0.75)) brightness(1.08); }\n  }\n\n  /* SMOKE: soft desaturated, slight blur breathing */\n  .fx-smoke {\n    color: oklch(78% 0.012 250);\n    text-shadow: 0 0 16px oklch(60% 0.01 250 / 0.5);\n    animation: smokeBreath 4s ease-in-out infinite;\n  }\n  @keyframes smokeBreath {\n    0%, 100% { filter: blur(0.2px); opacity: 0.92; }\n    50% { filter: blur(0.8px); opacity: 0.78; }\n  }\n\n  /* METAL: brushed silver gradient with shimmer pass */\n  .fx-metal {\n    background: linear-gradient(100deg,\n      oklch(60% 0.01 240) 0%,\n      oklch(92% 0.01 240) 25%,\n      oklch(70% 0.01 240) 50%,\n      oklch(96% 0.012 240) 70%,\n      oklch(62% 0.01 240) 100%);\n    background-size: 250% 100%;\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    animation: metalShine 5s linear infinite;\n    text-shadow: 0 1px 0 oklch(45% 0.01 240 / 0.6);\n  }\n  @keyframes metalShine {\n    0% { background-position: 0% 0; }\n    100% { background-position: 250% 0; }\n  }\n\n  /* WIND: subtle horizontal skew + lighter weight, italic */\n  .fx-wind {\n    color: oklch(86% 0.04 200);\n    font-style: italic;\n    animation: windLean 3s ease-in-out infinite;\n    text-shadow: 8px 0 18px oklch(80% 0.06 200 / 0.35), -2px 0 8px oklch(80% 0.06 200 / 0.2);\n  }\n  @keyframes windLean {\n    0%, 100% { transform: skewX(-4deg) translateX(0); }\n    50% { transform: skewX(-7deg) translateX(2px); }\n  }\n\n  /* ICE: cool gradient + sharp glint */\n  .fx-ice {\n    background: linear-gradient(180deg,\n      oklch(96% 0.04 220) 0%,\n      oklch(82% 0.10 220) 60%,\n      oklch(70% 0.12 230) 100%);\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    text-shadow: 0 0 14px oklch(85% 0.10 220 / 0.55);\n    filter: drop-shadow(0 2px 0 oklch(60% 0.08 230 / 0.4));\n  }\n\n  /* ELECTRIC: jittery yellow with quick flashes */\n  .fx-electric {\n    color: oklch(92% 0.18 95);\n    text-shadow:\n      0 0 6px oklch(90% 0.22 95),\n      0 0 18px oklch(80% 0.20 95 / 0.8),\n      0 0 36px oklch(75% 0.18 100 / 0.5);\n    animation: zap 0.18s steps(2) infinite;\n  }\n  @keyframes zap {\n    0% { transform: translate(0,0); }\n    50% { transform: translate(0.5px, -0.5px); }\n    100% { transform: translate(-0.5px, 0.5px); }\n  }\n\n  /* WATER: liquid gradient + gentle wave */\n  .fx-water {\n    background: linear-gradient(180deg,\n      oklch(86% 0.08 230) 0%,\n      oklch(68% 0.14 235) 60%,\n      oklch(55% 0.14 240) 100%);\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    animation: waterWave 3.5s ease-in-out infinite;\n    text-shadow: 0 4px 12px oklch(60% 0.12 235 / 0.45);\n  }\n  @keyframes waterWave {\n    0%, 100% { transform: translateY(0); }\n    50% { transform: translateY(-2px); }\n  }\n\n  /* GOLD: warm metallic with shimmer */\n  .fx-gold {\n    background: linear-gradient(100deg,\n      oklch(70% 0.13 80) 0%,\n      oklch(92% 0.16 90) 30%,\n      oklch(75% 0.14 80) 55%,\n      oklch(95% 0.16 95) 75%,\n      oklch(70% 0.13 80) 100%);\n    background-size: 250% 100%;\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    animation: metalShine 6s linear infinite;\n    text-shadow: 0 1px 0 oklch(50% 0.10 80 / 0.7);\n  }\n\n  /* SHADOW: very dark, with a darker halo and offset ghost */\n  .fx-shadow {\n    color: oklch(35% 0.01 280);\n    text-shadow:\n      2px 2px 0 oklch(20% 0.01 280),\n      -1px -1px 0 oklch(28% 0.01 280),\n      0 0 24px oklch(10% 0.01 280 / 0.9);\n  }\n\n  /* GLITCH: RGB split + jitter */\n  .fx-glitch {\n    color: oklch(95% 0.02 320);\n    text-shadow:\n      2px 0 0 oklch(70% 0.22 25),\n      -2px 0 0 oklch(75% 0.18 220),\n      0 0 12px oklch(80% 0.15 320 / 0.5);\n    animation: glitchShift 0.3s steps(3) infinite;\n  }\n  @keyframes glitchShift {\n    0% { transform: translate(0,0); }\n    33% { transform: translate(1px, -1px); }\n    66% { transform: translate(-1px, 1px); }\n    100% { transform: translate(0,0); }\n  }\n\n  /* Footer */\n  .foot {\n    position: fixed; bottom: 0; left: 0; right: 0;\n    padding: 14px 22px;\n    border-top: 1px solid var(--rule);\n    background: linear-gradient(to top, var(--bg) 70%, transparent);\n    color: var(--ink-dim);\n    font-size: 11px;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    z-index: 50;\n    display: flex; justify-content: space-between; align-items: center; gap: 16px;\n  }\n  .foot kbd {\n    font-family: \"JetBrains Mono\", monospace;\n    border: 1px solid var(--rule);\n    background: var(--bg-2);\n    padding: 1px 6px;\n    border-radius: 4px;\n    font-size: 10px;\n    color: var(--ink);\n  }\n  .foot .right { display: flex; gap: 14px; align-items: center; }\n\n  /* Scrollbar */\n  .stage::-webkit-scrollbar { width: 10px; }\n  .stage::-webkit-scrollbar-track { background: transparent; }\n  .stage::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 8px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"chrome\">\n  <div class=\"title\">⌁ TEXT&nbsp;&nbsp;PARTICLE&nbsp;&nbsp;FIELD<\u002Fdiv>\n  <div class=\"legend\">\n    <span class=\"chip\" data-w=\"fire\"><span class=\"dot\"><\u002Fspan>fire<\u002Fspan>\n    <span class=\"chip\" data-w=\"smoke\"><span class=\"dot\"><\u002Fspan>smoke<\u002Fspan>\n    <span class=\"chip\" data-w=\"metal\"><span class=\"dot\"><\u002Fspan>metal<\u002Fspan>\n    <span class=\"chip\" data-w=\"wind\"><span class=\"dot\"><\u002Fspan>wind<\u002Fspan>\n    <span class=\"chip\" data-w=\"ice\"><span class=\"dot\"><\u002Fspan>ice<\u002Fspan>\n    <span class=\"chip\" data-w=\"electric\"><span class=\"dot\"><\u002Fspan>electric<\u002Fspan>\n    <span class=\"chip\" data-w=\"water\"><span class=\"dot\"><\u002Fspan>water<\u002Fspan>\n    <span class=\"chip\" data-w=\"gold\"><span class=\"dot\"><\u002Fspan>gold<\u002Fspan>\n    <span class=\"chip\" data-w=\"shadow\"><span class=\"dot\"><\u002Fspan>shadow<\u002Fspan>\n    <span class=\"chip\" data-w=\"glitch\"><span class=\"dot\"><\u002Fspan>glitch<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"stage\" id=\"stage\">\n  <div id=\"editor\" class=\"editor\" contenteditable=\"true\" spellcheck=\"false\" autocorrect=\"off\" autocapitalize=\"off\">The fire crackled low while the smoke curled upward, threading itself through cold metal beams and the long, restless wind. Outside, a sheet of ice clung to the glass, and a sudden electric flash lit the room — then water dripped from the eaves, gold against the lamplight, before the shadow returned and the screen began to glitch. Type anything you like; the words above will keep their effects.<\u002Fdiv>\n<\u002Fdiv>\n\n<canvas id=\"fx-canvas\"><\u002Fcanvas>\n\n<div class=\"foot\">\n  <div>Editable · Type to continue · Trigger words animate automatically<\u002Fdiv>\n  <div class=\"right\">\n    <span><kbd>⌘<\u002Fkbd> <kbd>A<\u002Fkbd> select<\u002Fspan>\n    <span><kbd>esc<\u002Fkbd> blur<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ---------- Trigger word registry ---------- */\nconst TRIGGERS = [\"fire\",\"smoke\",\"metal\",\"wind\",\"ice\",\"electric\",\"water\",\"gold\",\"shadow\",\"glitch\"];\nconst TRIGGER_RE = new RegExp(`\\\\b(${TRIGGERS.join(\"|\")})\\\\b`, \"gi\");\n\nconst editor = document.getElementById(\"editor\");\nconst stage = document.getElementById(\"stage\");\nconst canvas = document.getElementById(\"fx-canvas\");\nconst ctx = canvas.getContext(\"2d\");\n\n/* ---------- Caret save/restore using char offsets ---------- */\nfunction getCaretOffset(el) {\n  const sel = window.getSelection();\n  if (!sel.rangeCount) return null;\n  const range = sel.getRangeAt(0);\n  if (!el.contains(range.startContainer)) return null;\n  const pre = range.cloneRange();\n  pre.selectNodeContents(el);\n  pre.setEnd(range.startContainer, range.startOffset);\n  return pre.toString().length;\n}\nfunction setCaretOffset(el, offset) {\n  if (offset == null) return;\n  const sel = window.getSelection();\n  const range = document.createRange();\n  let remaining = offset;\n  let found = false;\n  function walk(node) {\n    if (found) return;\n    if (node.nodeType === Node.TEXT_NODE) {\n      const len = node.nodeValue.length;\n      if (remaining <= len) {\n        range.setStart(node, remaining);\n        range.collapse(true);\n        found = true;\n        return;\n      }\n      remaining -= len;\n    } else {\n      for (const child of node.childNodes) walk(child);\n    }\n  }\n  walk(el);\n  if (found) {\n    sel.removeAllRanges();\n    sel.addRange(range);\n  }\n}\n\n/* ---------- Wrap trigger words in spans without losing caret ---------- */\nfunction rewrap() {\n  const offset = document.activeElement === editor ? getCaretOffset(editor) : null;\n  const text = editor.innerText.replace(/\\n/g, \"\\n\");\n  // Build HTML by escaping then replacing\n  const escaped = text\n    .replace(/&/g,\"&amp;\")\n    .replace(/<\u002Fg,\"&lt;\")\n    .replace(/>/g,\"&gt;\");\n  const html = escaped.replace(TRIGGER_RE, (m) => {\n    const key = m.toLowerCase();\n    return `<span class=\"fx fx-${key}\" data-fx=\"${key}\">${m}<\u002Fspan>`;\n  }).replace(/\\n/g, \"<br>\");\n  if (editor.innerHTML !== html) {\n    editor.innerHTML = html;\n    if (offset != null) setCaretOffset(editor, offset);\n  }\n  collectWordRects();\n}\n\nlet triggerRects = []; // [{key, rect}]\nfunction collectWordRects() {\n  triggerRects = [];\n  const overlayRect = canvas.getBoundingClientRect();\n  for (const el of editor.querySelectorAll(\".fx\")) {\n    const r = el.getBoundingClientRect();\n    triggerRects.push({\n      key: el.dataset.fx,\n      x: r.left - overlayRect.left,\n      y: r.top - overlayRect.top,\n      w: r.width,\n      h: r.height,\n    });\n  }\n}\n\n/* ---------- Canvas sizing ---------- */\nfunction resizeCanvas() {\n  const r = canvas.getBoundingClientRect();\n  const dpr = Math.min(window.devicePixelRatio || 1, 2);\n  canvas.width = r.width * dpr;\n  canvas.height = r.height * dpr;\n  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n  collectWordRects();\n}\n\n/* ---------- Particle system ---------- */\nconst particles = [];\nconst MAX_P = 1400;\n\nfunction spawn(p) {\n  if (particles.length > MAX_P) particles.shift();\n  particles.push(p);\n}\n\nfunction rand(a,b){ return a + Math.random() * (b-a); }\n\nconst SPAWNERS = {\n  fire(rect, t) {\n    // hot embers rising from bottom of word\n    const count = Math.max(1, Math.round(rect.w / 30));\n    for (let i = 0; i < count; i++) {\n      if (Math.random() > 0.55) continue;\n      spawn({\n        type: \"fire\",\n        x: rect.x + Math.random() * rect.w,\n        y: rect.y + rect.h - rand(0, rect.h * 0.4),\n        vx: rand(-0.2, 0.2),\n        vy: rand(-1.2, -0.4),\n        life: 0,\n        max: rand(60, 110),\n        size: rand(1.5, 3.2),\n        hue: rand(20, 50),\n      });\n    }\n  },\n  smoke(rect) {\n    const count = Math.max(1, Math.round(rect.w / 60));\n    for (let i = 0; i < count; i++) {\n      if (Math.random() > 0.4) continue;\n      spawn({\n        type: \"smoke\",\n        x: rect.x + Math.random() * rect.w,\n        y: rect.y + rand(-rect.h*0.2, rect.h*0.3),\n        vx: rand(-0.15, 0.4),\n        vy: rand(-0.6, -0.15),\n        life: 0,\n        max: rand(120, 220),\n        size: rand(8, 18),\n        rot: Math.random() * Math.PI,\n        spin: rand(-0.01, 0.01),\n      });\n    }\n  },\n  metal(rect) {\n    // sparks on surface\n    if (Math.random() > 0.25) return;\n    const count = 2;\n    for (let i = 0; i < count; i++) {\n      spawn({\n        type: \"spark\",\n        x: rect.x + Math.random() * rect.w,\n        y: rect.y + Math.random() * rect.h,\n        vx: rand(-1.6, 1.6),\n        vy: rand(-1.6, 0.4),\n        life: 0,\n        max: rand(20, 40),\n        size: rand(0.8, 1.6),\n        color: \"oklch(95% 0.02 240)\",\n      });\n    }\n  },\n  wind(rect) {\n    // streaks moving rightward through the word\n    const count = Math.max(1, Math.round(rect.w / 40));\n    for (let i = 0; i < count; i++) {\n      if (Math.random() > 0.3) continue;\n      spawn({\n        type: \"wind\",\n        x: rect.x - rand(0, 60),\n        y: rect.y + Math.random() * rect.h,\n        vx: rand(2.2, 4.5),\n        vy: rand(-0.1, 0.1),\n        life: 0,\n        max: rand(40, 70),\n        size: rand(8, 22),\n      });\n    }\n  },\n  ice(rect) {\n    // tiny crystals drifting down\n    if (Math.random() > 0.35) return;\n    spawn({\n      type: \"ice\",\n      x: rect.x + Math.random() * rect.w,\n      y: rect.y + rect.h - rand(0, 4),\n      vx: rand(-0.15, 0.15),\n      vy: rand(0.3, 0.9),\n      life: 0,\n      max: rand(80, 140),\n      size: rand(1.4, 2.6),\n      rot: Math.random() * Math.PI * 2,\n    });\n  },\n  electric(rect, t) {\n    // occasional bolts inside the bbox\n    if (Math.random() > 0.15) return;\n    spawn({\n      type: \"bolt\",\n      rect: { ...rect },\n      life: 0,\n      max: rand(6, 12),\n      seed: Math.random() * 1000,\n    });\n    // micro sparks\n    for (let i = 0; i < 2; i++) {\n      spawn({\n        type: \"spark\",\n        x: rect.x + Math.random() * rect.w,\n        y: rect.y + Math.random() * rect.h,\n        vx: rand(-1, 1),\n        vy: rand(-1, 1),\n        life: 0,\n        max: rand(10, 24),\n        size: rand(0.8, 1.6),\n        color: \"oklch(95% 0.20 95)\",\n      });\n    }\n  },\n  water(rect) {\n    // droplets falling from underside\n    if (Math.random() > 0.5) return;\n    spawn({\n      type: \"drop\",\n      x: rect.x + Math.random() * rect.w,\n      y: rect.y + rect.h * 0.85,\n      vx: rand(-0.05, 0.05),\n      vy: rand(0.6, 1.2),\n      life: 0,\n      max: rand(50, 90),\n      size: rand(1.6, 2.6),\n    });\n  },\n  gold(rect) {\n    // sparkles at random positions in word\n    if (Math.random() > 0.18) return;\n    spawn({\n      type: \"sparkle\",\n      x: rect.x + Math.random() * rect.w,\n      y: rect.y + Math.random() * rect.h,\n      life: 0,\n      max: rand(20, 40),\n      size: rand(2, 4),\n      color: \"oklch(92% 0.16 90)\",\n    });\n  },\n  shadow(rect) {\n    // dark wisps falling down\n    if (Math.random() > 0.4) return;\n    spawn({\n      type: \"wisp\",\n      x: rect.x + Math.random() * rect.w,\n      y: rect.y + rect.h * 0.7,\n      vx: rand(-0.2, 0.2),\n      vy: rand(0.2, 0.6),\n      life: 0,\n      max: rand(70, 130),\n      size: rand(6, 14),\n    });\n  },\n  glitch(rect) {\n    // horizontal slice rectangles\n    if (Math.random() > 0.2) return;\n    const sliceY = rect.y + Math.random() * rect.h;\n    spawn({\n      type: \"slice\",\n      x: rect.x,\n      y: sliceY,\n      w: rect.w,\n      h: rand(1, 3),\n      life: 0,\n      max: rand(4, 10),\n      offset: rand(-12, 12),\n      color: Math.random() < 0.5 ? \"oklch(70% 0.22 25)\" : \"oklch(75% 0.18 220)\",\n    });\n  },\n};\n\n/* ---------- Render ---------- */\nfunction step(dt, t) {\n  ctx.clearRect(0, 0, canvas.width, canvas.height);\n\n  // Spawn from each trigger word\n  for (const r of triggerRects) {\n    const fn = SPAWNERS[r.key];\n    if (fn) fn(r, t);\n  }\n\n  // Update + draw\n  for (let i = particles.length - 1; i >= 0; i--) {\n    const p = particles[i];\n    p.life += 1;\n    if (p.life > p.max) {\n      particles.splice(i, 1);\n      continue;\n    }\n    const lifeT = p.life / p.max;\n\n    switch (p.type) {\n      case \"fire\": {\n        p.x += p.vx;\n        p.y += p.vy;\n        p.vy -= 0.015; // float up faster\n        p.vx += rand(-0.05, 0.05);\n        const hue = p.hue - lifeT * 25;\n        const alpha = (1 - lifeT) * 0.85;\n        ctx.fillStyle = `oklch(${85 - lifeT * 30}% ${0.22 - lifeT * 0.1} ${hue} / ${alpha})`;\n        ctx.beginPath();\n        ctx.arc(p.x, p.y, p.size * (1 - lifeT * 0.6), 0, Math.PI * 2);\n        ctx.fill();\n        break;\n      }\n      case \"smoke\": {\n        p.x += p.vx;\n        p.y += p.vy;\n        p.vy -= 0.005;\n        p.rot += p.spin;\n        const alpha = Math.sin(lifeT * Math.PI) * 0.18;\n        ctx.fillStyle = `oklch(70% 0.005 250 / ${alpha})`;\n        ctx.beginPath();\n        ctx.ellipse(p.x, p.y, p.size * (1 + lifeT * 1.4), p.size * (1 + lifeT * 0.9), p.rot, 0, Math.PI * 2);\n        ctx.fill();\n        break;\n      }\n      case \"spark\": {\n        p.x += p.vx;\n        p.y += p.vy;\n        p.vy += 0.06;\n        const alpha = 1 - lifeT;\n        ctx.fillStyle = p.color.replace(/\\)$/, ` / ${alpha})`).replace(\"oklch(\", \"oklch(\");\n        // simpler: rebuild\n        ctx.fillStyle = p.color;\n        ctx.globalAlpha = alpha;\n        ctx.beginPath();\n        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);\n        ctx.fill();\n        ctx.globalAlpha = 1;\n        break;\n      }\n      case \"wind\": {\n        p.x += p.vx;\n        p.y += p.vy;\n        const alpha = Math.sin(lifeT * Math.PI) * 0.35;\n        ctx.strokeStyle = `oklch(86% 0.04 200 / ${alpha})`;\n        ctx.lineWidth = 1;\n        ctx.beginPath();\n        ctx.moveTo(p.x, p.y);\n        ctx.lineTo(p.x + p.size, p.y);\n        ctx.stroke();\n        break;\n      }\n      case \"ice\": {\n        p.x += p.vx;\n        p.y += p.vy;\n        p.vy += 0.005;\n        const alpha = (1 - lifeT) * 0.9;\n        ctx.fillStyle = `oklch(92% 0.10 220 / ${alpha})`;\n        ctx.beginPath();\n        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);\n        ctx.fill();\n        // tiny cross glint\n        ctx.strokeStyle = `oklch(98% 0.05 220 / ${alpha})`;\n        ctx.lineWidth = 0.6;\n        ctx.beginPath();\n        ctx.moveTo(p.x - p.size * 1.6, p.y); ctx.lineTo(p.x + p.size * 1.6, p.y);\n        ctx.moveTo(p.x, p.y - p.size * 1.6); ctx.lineTo(p.x, p.y + p.size * 1.6);\n        ctx.stroke();\n        break;\n      }\n      case \"bolt\": {\n        // jagged polyline through rect\n        const r = p.rect;\n        ctx.strokeStyle = `oklch(95% 0.20 95 / ${1 - lifeT})`;\n        ctx.lineWidth = 1.2;\n        ctx.shadowColor = \"oklch(85% 0.20 95)\";\n        ctx.shadowBlur = 10;\n        ctx.beginPath();\n        const segs = 6;\n        const sy = r.y + Math.random() * r.h;\n        ctx.moveTo(r.x, sy);\n        for (let s = 1; s <= segs; s++) {\n          const xx = r.x + (r.w * s) / segs;\n          const yy = r.y + r.h * (0.2 + Math.random() * 0.6);\n          ctx.lineTo(xx, yy);\n        }\n        ctx.stroke();\n        ctx.shadowBlur = 0;\n        break;\n      }\n      case \"drop\": {\n        p.x += p.vx;\n        p.y += p.vy;\n        p.vy += 0.04;\n        const alpha = 1 - lifeT * 0.7;\n        ctx.fillStyle = `oklch(72% 0.13 235 / ${alpha})`;\n        ctx.beginPath();\n        ctx.ellipse(p.x, p.y, p.size * 0.6, p.size * 1.2, 0, 0, Math.PI * 2);\n        ctx.fill();\n        break;\n      }\n      case \"sparkle\": {\n        const alpha = Math.sin(lifeT * Math.PI);\n        ctx.strokeStyle = `oklch(95% 0.16 90 / ${alpha})`;\n        ctx.lineWidth = 1;\n        const s = p.size * (0.6 + Math.sin(lifeT * Math.PI) * 0.6);\n        ctx.beginPath();\n        ctx.moveTo(p.x - s, p.y); ctx.lineTo(p.x + s, p.y);\n        ctx.moveTo(p.x, p.y - s); ctx.lineTo(p.x, p.y + s);\n        ctx.stroke();\n        ctx.fillStyle = `oklch(95% 0.16 90 / ${alpha})`;\n        ctx.beginPath();\n        ctx.arc(p.x, p.y, 0.8, 0, Math.PI * 2);\n        ctx.fill();\n        break;\n      }\n      case \"wisp\": {\n        p.x += p.vx;\n        p.y += p.vy;\n        p.vy += 0.003;\n        const alpha = Math.sin(lifeT * Math.PI) * 0.28;\n        ctx.fillStyle = `oklch(15% 0.01 280 / ${alpha})`;\n        ctx.beginPath();\n        ctx.ellipse(p.x, p.y, p.size * (1 + lifeT), p.size * (0.6 + lifeT * 0.6), 0, 0, Math.PI * 2);\n        ctx.fill();\n        break;\n      }\n      case \"slice\": {\n        ctx.fillStyle = p.color;\n        ctx.globalAlpha = 1 - lifeT;\n        ctx.fillRect(p.x + p.offset, p.y, p.w, p.h);\n        ctx.globalAlpha = 1;\n        break;\n      }\n    }\n  }\n}\n\nlet last = performance.now();\nfunction loop(t) {\n  const dt = Math.min(50, t - last);\n  last = t;\n  step(dt, t);\n  requestAnimationFrame(loop);\n}\nrequestAnimationFrame(loop);\n\n/* ---------- Wire up ---------- */\nwindow.addEventListener(\"resize\", () => { resizeCanvas(); });\nstage.addEventListener(\"scroll\", collectWordRects, { passive: true });\neditor.addEventListener(\"input\", () => {\n  rewrap();\n});\neditor.addEventListener(\"keydown\", (e) => {\n  if (e.key === \"Escape\") editor.blur();\n});\n\n// Recompute rects often (font load, layout shifts, animation transforms shift bboxes a tiny bit)\nsetInterval(collectWordRects, 400);\n\n// Initial\nresizeCanvas();\nrewrap();\n// Re-collect after fonts load (Fraunces alters word widths significantly)\nif (document.fonts && document.fonts.ready) {\n  document.fonts.ready.then(() => { collectWordRects(); });\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
